<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - Contrak</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .customers-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); backdrop-filter: blur(10px); padding: 1.5rem; border-radius: 12px; }
    .stat-card h3 { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 1.75rem; font-weight: 700; background: linear-gradient(135deg, var(--green-300), var(--green-500)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .table-wrap { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead { border-bottom: 1px solid var(--border); }
    th { text-align: left; padding: 1rem 1.25rem; color: var(--text-muted); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    td { padding: 1rem 1.25rem; color: var(--green-200); font-size: 0.9rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(52,211,153,0.03); }
    .email-cell { cursor: pointer; color: var(--green-300); font-weight: 600; }
    .email-cell:hover { text-decoration: underline; }
    .tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; background: rgba(52,211,153,0.12); color: #34D399; margin: 0.1rem 0.15rem; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .empty-state p { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .empty-state h3 { font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--green-100); }
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: #065F46; color: #D1FAE5; padding: 0.75rem 1.5rem; border-radius: 10px; font-size: 0.9rem; font-weight: 600; opacity: 0; transform: translateY(10px); transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">CONTRAK.IO</a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/ebooks">Ebooks</a></li>
        <li><a href="/products">Products</a></li>
        <li><a href="/pages">Pages</a></li>
        <li><a href="/media">Media</a></li>
        <li><a href="/orders-admin">Orders</a></li>
        <li><a href="/coupons">Coupons</a></li>
        <li><a href="/customers" class="active">Customers</a></li>
        <li><a href="/blog">Blog</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><span id="userPlan" class="plan-badge basic">BASIC</span></li>
        <li><button id="logoutBtn" class="btn btn-outline">Log out</button></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="customers-header">
      <div>
        <h1 style="color:var(--green-100);">Customers</h1>
        <p style="color:var(--text-muted);">People who purchased your products.</p>
      </div>
    </div>

    <div id="alertContainer"></div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <h3>Total Customers</h3>
        <div class="value" id="totalCustomers">-</div>
      </div>
      <div class="stat-card">
        <h3>Total Revenue</h3>
        <div class="value" id="totalRevenue">€0</div>
      </div>
      <div class="stat-card">
        <h3>Avg Order Value</h3>
        <div class="value" id="avgOrderValue">€0</div>
      </div>
    </div>

    <div id="customersContainer">
      <div class="loading" style="padding:2rem;text-align:center;">
        <div class="spinner"></div>
        <p style="color:var(--text-muted);margin-top:0.5rem;">Loading customers...</p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Copied!</div>

  <script>
    (function() {
      var nav = document.querySelector('header nav');
      if (!nav) return;
      var toggle = nav.querySelector('.nav-toggle');
      var links = nav.querySelector('.nav-links');
      if (!toggle || !links) return;
      toggle.addEventListener('click', function() {
        var isOpen = links.classList.toggle('nav-links--open');
        toggle.classList.toggle('nav-toggle--open', isOpen);
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    })();

    var currentUser = null;
    var allCustomers = [];

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg || 'Copied!';
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    function copyEmail(email) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(email).then(function() {
          showToast('Copied ' + email);
        }).catch(function() {
          fallbackCopy(email);
        });
      } else {
        fallbackCopy(email);
      }
    }

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showToast('Copied ' + text); } catch(e) {}
      document.body.removeChild(ta);
    }

    async function checkAuth() {
      try {
        var r = await fetch('/api/auth/me', { credentials: 'include' });
        if (!r.ok) { window.location.href = '/login'; return; }
        var d = await r.json();
        currentUser = d.user;
        var badge = document.getElementById('userPlan');
        if (currentUser.plan === 'pro') {
          badge.textContent = 'PRO';
          badge.className = 'plan-badge pro';
        }
        loadCustomers();
      } catch(e) { window.location.href = '/login'; }
    }

    async function loadCustomers() {
      try {
        var r = await fetch('/api/orders/customers/list', { credentials: 'include' });
        if (!r.ok) throw new Error('Failed to load customers');
        var d = await r.json();
        allCustomers = d.customers || [];
        render();
      } catch(e) {
        document.getElementById('customersContainer').innerHTML = '<div class="alert alert-error">' + e.message + '</div>';
      }
    }

    function render() {
      updateStats();
      renderTable();
    }

    function formatPrice(cents) {
      return (cents / 100).toFixed(2);
    }

    function updateStats() {
      var total = allCustomers.length;
      var revenue = allCustomers.reduce(function(sum, c) { return sum + (c.totalSpent || 0); }, 0);
      var totalOrders = allCustomers.reduce(function(sum, c) { return sum + (c.orderCount || 0); }, 0);
      var avg = totalOrders > 0 ? revenue / totalOrders : 0;

      document.getElementById('totalCustomers').textContent = total;
      document.getElementById('totalRevenue').textContent = formatPrice(revenue) + ' €';
      document.getElementById('avgOrderValue').textContent = formatPrice(avg) + ' €';
    }

    function renderTable() {
      var container = document.getElementById('customersContainer');

      if (!allCustomers.length) {
        container.innerHTML = '<div class="empty-state"><p>👥</p><h3>No customers yet</h3><p>When someone purchases your products, they will appear here.</p></div>';
        return;
      }

      var html = '<div class="table-wrap"><table><thead><tr>' +
        '<th>Email</th><th>Purchases</th><th>Total Spent</th><th>Last Purchase</th><th>Products</th>' +
        '</tr></thead><tbody>';

      allCustomers.forEach(function(c) {
        var dateStr = c.lastPurchase ? new Date(c.lastPurchase).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';
        var productsHtml = (c.products || []).map(function(p) {
          return '<span class="tag">' + escapeHtml(p) + '</span>';
        }).join('') || '<span style="color:var(--text-muted);font-size:0.85rem;">-</span>';

        html += '<tr>' +
          '<td class="email-cell" onclick="copyEmail(\'' + escapeAttr(c.email) + '\')" title="Click to copy">' + escapeHtml(c.email) + '</td>' +
          '<td>' + c.orderCount + '</td>' +
          '<td>' + formatPrice(c.totalSpent) + ' €</td>' +
          '<td>' + dateStr + '</td>' +
          '<td>' + productsHtml + '</td>' +
          '</tr>';
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function escapeAttr(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#039;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    document.getElementById('logoutBtn').addEventListener('click', async function() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/';
    });

    checkAuth();
  </script>
</body>
</html>
