<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Contrak</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .cart-container { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.75rem; background: var(--card-bg); }
    .cart-item-info { flex: 1; }
    .cart-item-title { font-weight: 600; color: var(--green-100); }
    .cart-item-version { color: var(--text-muted); font-size: 0.85rem; }
    .cart-item-price { font-weight: 700; color: var(--green-300); }
    .cart-summary { border-top: 2px solid var(--border); padding-top: 1.5rem; margin-top: 1rem; text-align: right; }
    .cart-total { font-size: 1.5rem; font-weight: 700; color: var(--green-100); }
    .empty-cart { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
    .empty-cart h2 { margin-bottom: 1rem; }
    .btn-remove { background: none; border: none; color: #EF4444; cursor: pointer; font-size: 0.85rem; padding: 0.25rem 0.5rem; }
    .btn-remove:hover { text-decoration: underline; }
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .cart-header h1 { margin: 0; }
    .loading { text-align: center; padding: 4rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">CONTRAK.IO</a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/pricing">Pricing</a></li>
        <li><a href="/media">Media</a></li>
        <li><a href="/orders-admin">Orders</a></li>
        <li><a href="/blog">Blog</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="/cart" class="active">Cart</a></li>
        <li><a href="/login">Log in</a></li>
        <li><a href="/register" class="btn-cta">Sign up</a></li>
      </ul>
    </nav>
  </header>

  <div class="cart-container">
    <div class="cart-header">
      <h1>Shopping Cart</h1>
      <button class="btn btn-outline" id="clearBtn" style="display:none;" onclick="clearCart()">Clear Cart</button>
    </div>
    <div id="cartItems">
      <div class="loading"><div class="spinner"></div><p>Loading cart...</p></div>
    </div>
  </div>

  <script>
    let appliedCoupon = null;
    let currentCartItems = [];

    function getCurrencySymbol(code) {
      const map = { 'EUR': '€', 'USD': '$', 'GBP': '£', 'JPY': '¥', 'CAD': 'CA$', 'AUD': 'A$', 'CHF': 'Fr', 'CNY': '¥', 'SEK': 'kr', 'NOK': 'kr', 'DKK': 'kr', 'BRL': 'R$', 'INR': '₹' };
      return map[code?.toUpperCase()] || code || '€';
    }

    function renderCart(cart) {
      const container = document.getElementById('cartItems');
      const items = cart.items || [];

      if (items.length === 0) {
        container.innerHTML = `<div class="empty-cart"><h2>Your cart is empty</h2><p>Browse products and add them to your cart.</p><a href="/" class="btn btn-primary" style="margin-top:1rem;">Browse Products</a></div>`;
        document.getElementById('clearBtn').style.display = 'none';
        return;
      }

      document.getElementById('clearBtn').style.display = 'inline-block';

      const itemsHtml = items.map(item => {
        const price = ((item.price || 0) / 100).toFixed(2);
        const symbol = getCurrencySymbol(item.currency);
        return `<div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-title">${item.title || 'Untitled'}</div>
            <div class="cart-item-version">${item.versionLabel || ''}</div>
          </div>
          <div style="text-align:right;">
            <div class="cart-item-price">${symbol}${price}</div>
            <button class="btn-remove" onclick="removeItem('${item.productVersionId}')">Remove</button>
          </div>
        </div>`;
      }).join('');

      const total = items.reduce((sum, item) => sum + Number(item.price || 0), 0);
      const totalFormatted = (total / 100).toFixed(2);
      const currency = items[0]?.currency || 'EUR';
      const symbol = getCurrencySymbol(currency);

      container.innerHTML = itemsHtml + `
        <div class="cart-summary">
          <div class="coupon-section" style="margin-bottom:1rem;padding:1rem;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;text-align:left;">
            <label style="font-weight:600;color:var(--green-200);font-size:0.95rem;">Have a coupon?</label>
            <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
              <input type="text" id="couponInput" placeholder="Enter code" style="flex:1;padding:0.5rem;background:var(--dark);border:1px solid var(--border);color:var(--green-100);border-radius:6px;">
              <button class="btn btn-primary" onclick="applyCoupon('${currency}')" style="padding:0.5rem 1rem;font-size:0.9rem;">Apply</button>
            </div>
            <div id="couponMsg" style="font-size:0.9rem;margin-top:0.25rem;"></div>
          </div>
          <div class="cart-total">Total: ${symbol}${totalFormatted}</div>
          <button class="btn-cta" id="checkoutBtn" onclick="checkout()" style="margin-top:1rem;font-size:1.1rem;padding:14px 48px;">
            Proceed to Checkout →
          </button>
          <div id="checkoutError" style="color:#FCA5A5;margin-top:0.5rem;font-size:0.9rem;"></div>
        </div>
      `;
    }

    async function removeItem(versionId) {
      try {
        const resp = await fetch('/api/cart/items/' + versionId, { method: 'DELETE', credentials: 'include' });
        const d = await resp.json();
        if (!resp.ok) throw new Error(d.error || 'Failed to remove');
        renderCart(d.cart);
      } catch(e) {
        alert(e.message);
      }
    }

    async function clearCart() {
      try {
        const resp = await fetch('/api/cart', { method: 'DELETE', credentials: 'include' });
        const d = await resp.json();
        if (!resp.ok) throw new Error(d.error || 'Failed to clear');
        renderCart(d.cart);
      } catch(e) {
        alert(e.message);
      }
    }

    async function applyCoupon(currency) {
      const code = document.getElementById('couponInput').value.trim();
      const msgDiv = document.getElementById('couponMsg');
      if (!code) { msgDiv.innerHTML = '<span style="color:#FCA5A5;">Enter a code</span>'; return; }

      try {
        const resp = await fetch('/api/coupons/validate', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, amount: 0 })
        });
        const d = await resp.json();
        if (!d.valid) {
          msgDiv.innerHTML = '<span style="color:#FCA5A5;">' + (d.error || 'Invalid coupon') + '</span>';
          appliedCoupon = null;
          return;
        }
        appliedCoupon = code.toUpperCase();
        msgDiv.innerHTML = '<span style="color:#34D399;">✓ Coupon applied! Discount will be applied at checkout.</span>';
      } catch(e) {
        msgDiv.innerHTML = '<span style="color:#FCA5A5;">Error: ' + e.message + '</span>';
      }
    }

    async function checkout() {
      const btn = document.getElementById('checkoutBtn');
      const errDiv = document.getElementById('checkoutError');
      btn.disabled = true;
      btn.textContent = 'Processing...';
      errDiv.textContent = '';

      try {
        const body = {
          successUrl: window.location.origin + '/thank-you',
          cancelUrl: window.location.origin + '/cart?payment=cancel'
        };
        if (appliedCoupon) body.couponCode = appliedCoupon;

        const resp = await fetch('/api/orders/create-checkout-session', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const d = await resp.json();
        if (!resp.ok) throw new Error(d.error || 'Checkout failed');
        if (d.url) {
          window.location.href = d.url;
        } else {
          throw new Error('No checkout URL returned');
        }
      } catch(e) {
        errDiv.textContent = e.message;
        btn.disabled = false;
        btn.textContent = 'Proceed to Checkout →';
      }
    }

    async function guestCheckout() {
      const btn = document.getElementById('checkoutBtn');
      const errDiv = document.getElementById('checkoutError');
      const emailInput = document.getElementById('guestEmail');
      const guestEmail = emailInput ? emailInput.value.trim() : '';

      if (!guestEmail) { errDiv.textContent = 'Please enter your email'; return; }
      if (!guestEmail.includes('@')) { errDiv.textContent = 'Please enter a valid email'; return; }

      btn.disabled = true;
      btn.textContent = 'Processing...';
      errDiv.textContent = '';

      try {
        const items = currentCartItems;
        const body = {
          items: items,
          guestEmail: guestEmail
        };
        if (appliedCoupon) body.couponCode = appliedCoupon;

        const resp = await fetch('/api/orders/guest-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const d = await resp.json();
        if (!resp.ok) throw new Error(d.error || 'Checkout failed');
        if (d.url) {
          window.location.href = d.url;
        } else {
          throw new Error('No checkout URL returned');
        }
      } catch(e) {
        errDiv.textContent = e.message;
        btn.disabled = false;
        btn.textContent = 'Continue as Guest';
      }
    }

    async function loadCart() {
      try {
        const resp = await fetch('/api/cart', { credentials: 'include' });
        const d = await resp.json();
        if (!resp.ok) throw new Error(d.error || 'Failed to load cart');
        currentCartItems = d.cart?.items || [];
        renderCart(d.cart);
      } catch(e) {
        document.getElementById('cartItems').innerHTML = '<div class="empty-cart"><h2>Could not load cart</h2><p>' + e.message + '</p></div>';
        // Try guest mode - load from localStorage
        try {
          const stored = JSON.parse(localStorage.getItem('guest_cart') || '[]');
          if (stored.length) {
            currentCartItems = stored;
            renderCart({ items: stored });
          }
        } catch(se) {}
      }
    }

    function renderCart(cart) {
      const container = document.getElementById('cartItems');
      const items = cart.items || [];

      if (items.length === 0) {
        container.innerHTML = '<div class="empty-cart"><h2>Your cart is empty</h2><p>Browse products and add them to your cart.</p><a href="/" class="btn btn-primary" style="margin-top:1rem;">Browse Products</a></div>';
        document.getElementById('clearBtn').style.display = 'none';
        return;
      }

      document.getElementById('clearBtn').style.display = 'inline-block';

      const itemsHtml = items.map(function(item) {
        const price = ((item.price || 0) / 100).toFixed(2);
        const symbol = getCurrencySymbol(item.currency);
        return '<div class="cart-item">' +
          '<div class="cart-item-info"><div class="cart-item-title">' + (item.title || 'Untitled') + '</div><div class="cart-item-version">' + (item.versionLabel || '') + '</div></div>' +
          '<div style="text-align:right;"><div class="cart-item-price">' + symbol + price + '</div>' +
          '<button class="btn-remove" onclick="removeItem(\'' + item.productVersionId + '\')">Remove</button></div></div>';
      }).join('');

      const total = items.reduce(function(sum, item) { return sum + Number(item.price || 0); }, 0);
      const totalFormatted = (total / 100).toFixed(2);
      const currency = items[0]?.currency || 'EUR';
      const symbol = getCurrencySymbol(currency);

      container.innerHTML = itemsHtml +
        '<div class="cart-summary">' +
        '<div class="coupon-section" style="margin-bottom:1rem;padding:1rem;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;text-align:left;">' +
        '<label style="font-weight:600;color:var(--green-200);font-size:0.95rem;">Have a coupon?</label>' +
        '<div style="display:flex;gap:0.5rem;margin-top:0.5rem;">' +
        '<input type="text" id="couponInput" placeholder="Enter code" style="flex:1;padding:0.5rem;background:var(--dark);border:1px solid var(--border);color:var(--green-100);border-radius:6px;">' +
        '<button class="btn btn-primary" onclick="applyCoupon()" style="padding:0.5rem 1rem;font-size:0.9rem;">Apply</button></div>' +
        '<div id="couponMsg" style="font-size:0.9rem;margin-top:0.25rem;"></div></div>' +
        '<div class="cart-total">Total: ' + symbol + totalFormatted + '</div>' +
        '<div style="margin-top:1rem;" id="guestSection"></div>' +
        '<button class="btn-cta" id="checkoutBtn" onclick="checkout()" style="margin-top:1rem;font-size:1.1rem;padding:14px 48px;">Proceed to Checkout →</button>' +
        '<div id="checkoutError" style="color:#FCA5A5;margin-top:0.5rem;font-size:0.9rem;"></div></div>';

      // Show guest checkout option if not logged in
      checkAuthStatus();
    }

    async function checkAuthStatus() {
      try {
        const r = await fetch('/api/auth/verify', { credentials: 'include' });
        if (!r.ok) {
          showGuestOption();
        }
      } catch(e) {
        showGuestOption();
      }
    }

    function showGuestOption() {
      const section = document.getElementById('guestSection');
      if (!section) return;
      section.innerHTML = '<div style="border-top:1px solid var(--border);padding-top:1rem;margin-top:0.5rem;">' +
        '<p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:0.5rem;">Checkout without an account:</p>' +
        '<div style="display:flex;gap:0.5rem;">' +
        '<input type="email" id="guestEmail" placeholder="Your email for download links" style="flex:1;padding:0.5rem;background:var(--dark);border:1px solid var(--border);color:var(--green-100);border-radius:6px;">' +
        '<button class="btn btn-outline" onclick="guestCheckout()" style="padding:0.5rem 1rem;">Continue as Guest</button></div></div>';
      document.getElementById('checkoutBtn').textContent = 'Log in & Checkout →';
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('payment') === 'success') {
      window.location.href = '/thank-you';
    } else if (params.get('payment') === 'cancel') {
      alert('Payment cancelled.');
    }

    loadCart();
  </script>
</body>
</html>
