<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - Contrak</title>
  <meta name="description" content="Read article">
  <meta property="og:title" content="Article - Contrak">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="/style.css">
  <style>
    .article-cover { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 2rem; background: linear-gradient(135deg, var(--green-800), var(--green-900)); }
    .article-header { margin-bottom: 2rem; }
    .article-header h1 { font-size: 2.5rem; line-height: 1.2; margin-bottom: 0.75rem; color: var(--green-100); }
    .article-meta { display: flex; gap: 1.5rem; color: var(--text-muted); font-size: 0.95rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
    .article-tags { margin-bottom: 1.5rem; }
    .tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; background: rgba(52,211,153,0.1); border: 1px solid var(--border); color: var(--green-300); font-size: 0.8rem; margin: 0.15rem; }
    .article-content { font-size: 1.1rem; line-height: 1.8; color: var(--text-primary); max-width: 800px; }
    .article-content p { margin-bottom: 1.25rem; color: var(--text-secondary); }
    .article-content h2 { font-size: 1.75rem; margin: 2rem 0 0.75rem; color: var(--green-200); }
    .article-content h3 { font-size: 1.35rem; margin: 1.5rem 0 0.5rem; color: var(--green-200); }
    .article-content ul, .article-content ol { margin-bottom: 1.25rem; padding-left: 1.5rem; color: var(--text-secondary); }
    .article-content li { margin-bottom: 0.5rem; }
    .article-content blockquote { border-left: 3px solid var(--green-500); padding: 0.75rem 1.25rem; margin: 1.25rem 0; background: rgba(52,211,153,0.05); border-radius: 0 8px 8px 0; color: var(--green-200); }
    .article-content code { background: rgba(52,211,153,0.08); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9em; color: var(--green-300); }
    .article-content pre { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; overflow-x: auto; margin-bottom: 1.25rem; }
    .article-content pre code { background: none; padding: 0; }
    .article-content a { color: var(--green-400); }
    .article-content img { max-width: 100%; border-radius: 8px; margin: 1.5rem 0; }
    .loading-wrapper { text-align: center; padding: 4rem; }
    .error-state { text-align: center; padding: 4rem; }
    .error-state h2 { color: var(--green-200); margin-bottom: 0.5rem; }
    .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--green-400); text-decoration: none; margin-bottom: 2rem; font-weight: 500; }
    .back-link:hover { color: var(--green-300); }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">CONTRAK.IO</a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/blog">Blog</a></li>
        <li><a href="/pricing">Pricing</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <a href="/blog" class="back-link">&larr; Back to Blog</a>
    <div id="articleContainer">
      <div class="loading-wrapper"><div class="spinner"></div><p>Loading article...</p></div>
    </div>
  </div>

  <footer>
    <p>&copy; 2024 Contrak. All rights reserved.</p>
  </footer>

  <script>
    (function() {
      const toggle = document.querySelector('.nav-toggle');
      const links = document.querySelector('.nav-links');
      if (toggle && links) {
        toggle.addEventListener('click', function() {
          const isOpen = links.classList.toggle('nav-links--open');
          toggle.classList.toggle('nav-toggle--open', isOpen);
          toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });
      }
    })();

    var slug = window.location.pathname.replace('/blog/', '');

    async function loadArticle() {
      try {
        var r = await fetch('/api/blog/public/' + encodeURIComponent(slug));
        var d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Article not found');
        var a = d.article;
        renderArticle(a);
      } catch(e) {
        document.getElementById('articleContainer').innerHTML = '<div class="error-state"><h2>Article not found</h2><p>' + esc(e.message) + '</p><a href="/blog" class="btn btn-outline" style="margin-top:1rem;">Back to Blog</a></div>';
      }
    }

    function renderArticle(a) {
      document.title = a.title + ' - Contrak Blog';
      var metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.content = a.excerpt || a.title;
      var ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.content = a.title + ' - Contrak';

      var tagsHtml = (a.tags && a.tags.length) ? a.tags.map(function(t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('') : '';
      var coverHtml = a.coverImageUrl ? '<img class="article-cover" src="' + esc(a.coverImageUrl) + '" alt="' + esc(a.title) + '">' : '';

      document.getElementById('articleContainer').innerHTML =
        coverHtml +
        '<div class="article-header">' +
        '<h1>' + esc(a.title) + '</h1>' +
        '<div class="article-meta">' +
        '<span>' + formatDate(a.createdAt) + '</span>' +
        '</div>' +
        (tagsHtml ? '<div class="article-tags">' + tagsHtml + '</div>' : '') +
        '</div>' +
        '<div class="article-content">' + (a.content || '') + '</div>';
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function formatDate(d) {
      if (!d) return '';
      var date = d.toDate ? d.toDate() : new Date(d);
      return date.toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    loadArticle();
  </script>
</body>
</html>
