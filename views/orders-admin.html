<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Contrak</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .order-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .order-id { font-family: monospace; color: var(--green-100); font-size: 0.9rem; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .badge.pending { background: rgba(251,191,36,0.2); color: #FBBF24; }
    .badge.paid { background: rgba(52,211,153,0.2); color: #34D399; }
    .badge.cancelled { background: rgba(239,68,68,0.2); color: #EF4444; }
    .badge.refunded { background: rgba(168,85,247,0.2); color: #A855F7; }
    .order-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 0.75rem; color: var(--text-muted); font-size: 0.85rem; }
    .order-items { margin-top: 0.75rem; }
    .order-items table { width: 100%; border-collapse: collapse; }
    .order-items th { text-align: left; color: var(--text-muted); font-size: 0.8rem; font-weight: 600; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
    .order-items td { padding: 0.5rem 0; border-bottom: 1px solid var(--border); color: var(--green-200); font-size: 0.85rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab { padding: 0.5rem 1.25rem; border: 1px solid var(--border); border-radius: 9999px; cursor: pointer; color: var(--text-muted); font-size: 0.85rem; background: transparent; transition: all 0.2s; }
    .tab.active { background: linear-gradient(135deg, #34D399, #059669); color: #fff; border-color: transparent; }
    .tab:hover:not(.active) { border-color: #34D399; color: var(--green-100); }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .stat-card .value { font-size: 1.75rem; font-weight: 700; color: var(--green-100); }
    .stat-card .label { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.25rem; }
    .order-detail-toggle { background: none; border: none; color: #34D399; cursor: pointer; font-size: 0.8rem; padding: 0; }
    .order-detail-content { display: none; }
    .order-detail-content.open { display: block; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">CONTRAK.IO</a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/products">Products</a></li>
        <li><a href="/media">Media</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><span id="userPlan" class="plan-badge basic">BASIC</span></li>
        <li><button id="logoutBtn" class="btn btn-outline">Log out</button></li>
      </ul>
    </nav>
  </header>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1 style="color:var(--green-100);">Orders</h1>
        <p style="color:var(--text-muted);">View and manage customer orders for your products.</p>
      </div>
      <a href="/api/orders/export/csv" class="btn btn-outline" style="white-space:nowrap;"> Export CSV</a>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="value" id="totalOrders">-</div><div class="label">Total Orders</div></div>
      <div class="stat-card"><div class="value" id="paidOrders" style="color:#34D399;">-</div><div class="label">Paid</div></div>
      <div class="stat-card"><div class="value" id="totalRevenue" style="color:#FBBF24;">-</div><div class="label">Revenue</div></div>
    </div>

    <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;">
      <div class="tabs" style="margin-bottom:0;">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="paid">Paid</button>
        <button class="tab" data-filter="pending">Pending</button>
        <button class="tab" data-filter="refunded">Refunded</button>
      </div>
      <input type="text" id="searchInput" placeholder="Search by email or ID..." style="flex:1;min-width:200px;padding:0.5rem 0.75rem;background:var(--dark);border:1px solid var(--border);color:var(--green-100);border-radius:8px;">
    </div>

    <div id="ordersContainer"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <script>
    let currentUser = null;
    let allOrders = [];
    let currentFilter = 'all';

    const toggle = document.querySelector('.nav-toggle');
    const links = document.querySelector('.nav-links');
    if (toggle && links) {
      toggle.addEventListener('click', function() {
        const isOpen = links.classList.toggle('nav-links--open');
        toggle.classList.toggle('nav-toggle--open', isOpen);
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    }

    async function api(path, opts) {
      const r = await fetch(path, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...opts });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Request failed');
      return d;
    }

    async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (!r.ok) { window.location.href = '/login'; return; }
        const d = await r.json();
        currentUser = d.user;
        const badge = document.getElementById('userPlan');
        if (currentUser.plan === 'pro') { badge.textContent = 'PRO'; badge.className = 'plan-badge pro'; }
        loadOrders();
      } catch(e) { window.location.href = '/login'; }
    }

    async function loadOrders() {
      try {
        const d = await api('/api/orders/');
        allOrders = d.orders || [];
        render();
      } catch(e) { document.getElementById('ordersContainer').innerHTML = '<p style="color:var(--text-muted);">Error loading orders.</p>'; }
    }

    let searchTerm = '';

    function render() {
      updateStats();
      renderOrders();
    }

    function updateStats() {
      document.getElementById('totalOrders').textContent = allOrders.length;
      document.getElementById('paidOrders').textContent = allOrders.filter(function(o) { return o.status === 'paid'; }).length;
      const rev = allOrders.filter(function(o) { return o.status === 'paid'; }).reduce(function(sum, o) {
        return sum + ((o.totals && o.totals.finalTotal) || 0);
      }, 0);
      document.getElementById('totalRevenue').textContent = (rev / 100).toFixed(2) + ' ' + ((allOrders[0] && allOrders[0].currency) || 'EUR');
    }

    function renderOrders() {
      let filtered = currentFilter === 'all' ? allOrders : allOrders.filter(function(o) { return o.status === currentFilter; });
      if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(function(o) {
          const email = (o.userEmail || o.email || '').toLowerCase();
          const id = (o.id || o.orderId || '').toLowerCase();
          return email.includes(term) || id.includes(term);
        });
      }
      const container = document.getElementById('ordersContainer');

      if (!filtered.length) {
        container.innerHTML = '<div class="card"><p style="color:var(--text-muted);text-align:center;">No orders found.</p></div>';
        return;
      }

      container.innerHTML = filtered.map(function(o) {
        const id = (o.id || o.orderId || '').slice(0, 8);
        const total = o.totals && o.totals.finalTotal ? (o.totals.finalTotal / 100).toFixed(2) + ' ' + (o.currency || 'EUR') : '-';
        const items = o.items && o.items.length ? o.items : (o.productVersionId ? [{ title: 'Product', versionLabel: '' }] : []);
        const createdAt = o.createdAt ? new Date(o.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
        const badgeClass = o.status === 'paid' ? 'paid' : o.status === 'pending' ? 'pending' : o.status === 'refunded' ? 'refunded' : 'pending';

        return '<div class="card">' +
          '<div class="order-header">' +
            '<div><span class="order-id">#' + id + '</span> <span class="badge ' + badgeClass + '">' + o.status + '</span></div>' +
            '<span style="color:var(--green-100);font-weight:600;">' + total + '</span>' +
          '</div>' +
          '<div class="order-meta">' +
            '<span>' + createdAt + '</span>' +
            '<span>' + (o.userEmail || o.email || '') + '</span>' +
            '<span>' + items.length + ' item(s)</span>' +
          '</div>' +
          (items.length ? '<button class="order-detail-toggle" data-order="' + (o.id || '') + '">Show items ▾</button><div class="order-detail-content" data-id="' + (o.id || '') + '"><div class="order-items"><table><thead><tr><th>Item</th><th>Version</th><th>Price</th></tr></thead><tbody>' +
            items.map(function(i) {
              const price = i.price ? (i.price / 100).toFixed(2) + ' ' + (i.currency || 'EUR') : '-';
              return '<tr><td>' + (i.title || 'Product') + '</td><td>' + (i.versionLabel || '-') + '</td><td>' + price + '</td></tr>';
            }).join('') +
          '</tbody></table></div></div>' : '') +
        '</div>';
      }).join('');

      document.querySelectorAll('.order-detail-toggle').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const id = this.dataset.order;
          const content = document.querySelector('.order-detail-content[data-id="' + id + '"]');
          if (content) {
            content.classList.toggle('open');
            this.textContent = content.classList.contains('open') ? 'Hide items ▴' : 'Show items ▾';
          }
        });
      });
    }

    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        renderOrders();
      });
    });

    document.getElementById('searchInput').addEventListener('input', function() {
      searchTerm = this.value;
      renderOrders();
    });

    function showAlert(type, msg) {
      const c = document.getElementById('alertContainer');
      if (c) { c.innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>'; }
    }

    document.getElementById('logoutBtn').addEventListener('click', async function() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/';
    });

    checkAuth();
  </script>
</body>
</html>
