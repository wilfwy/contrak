<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Landing Page</title>
  <meta property="og:title" id="ogTitle" content="">
  <meta property="og:description" id="ogDesc" content="">
  <meta property="og:image" id="ogImage" content="">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="twTitle" content="">
  <meta name="twitter:description" id="twDesc" content="">
  <meta name="twitter:image" id="twImage" content="">
  <link rel="stylesheet" href="/style.css">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; }
    .lp-section { padding: 4rem 2rem; }
    .lp-section.light { background: #ffffff; color: #111827; }
    .lp-section.dark { background: #052E2B; color: #E6FFFB; }
    .lp-section.accent { background: #2563EB; color: #ffffff; }
    .lp-container { max-width: 1000px; margin: 0 auto; }
    .lp-hero { text-align: center; padding: 6rem 2rem; }
    .lp-hero h1 { font-size: 3rem; margin-bottom: 1rem; }
    .lp-hero p { font-size: 1.25rem; opacity: 0.8; margin-bottom: 2rem; }
    .lp-hero .btn-cta-landing { display: inline-block; padding: 14px 36px; background: #fff; color: #052E2B; border-radius: 9999px; font-weight: 700; text-decoration: none; transition: transform 0.2s; }
    .lp-hero.dark .btn-cta-landing { background: #fff; color: #052E2B; }
    .lp-hero.light .btn-cta-landing { background: #2563EB; color: #fff; }
    .lp-hero.accent .btn-cta-landing { background: #fff; color: #2563EB; }
    .lp-hero .btn-cta-landing:hover { transform: translateY(-2px) scale(1.02); }
    .lp-image { max-width: 100%; border-radius: 12px; margin-top: 2rem; }
    .lp-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 2rem; }
    .lp-feature-card { padding: 2rem; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .lp-feature-card.light { background: #ffffff; border-color: #E5E7EB; box-shadow: 0 10px 25px rgba(15,23,42,0.08); }
    .lp-feature-card h3 { margin-bottom: 0.5rem; }
    .lp-testimonials { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .lp-testimonial { padding: 1.5rem; border-radius: 12px; background: rgba(255,255,255,0.05); font-style: italic; }
    .lp-testimonial.light { background: #ffffff; border: 1px solid #E5E7EB; }
    .lp-section h2 { font-size: 2rem; margin-bottom: 1rem; text-align: center; }
    .lp-section .subtitle { text-align: center; font-size: 1.1rem; opacity: 0.8; margin-bottom: 2rem; }
    .lp-footer { text-align: center; padding: 2rem; color: #6B7280; font-size: 0.9rem; border-top: 1px solid #E5E7EB; }
    .lp-faq { max-width: 700px; margin: 0 auto; }
    .lp-faq-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1rem 0; }
    .lp-faq-item.light { border-color: #E5E7EB; }
    .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 1rem; }
    .error-screen { text-align: center; padding: 4rem 2rem; }
    .lp-nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; max-width: 1200px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>

  <script>
    fetch('/api/analytics/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'page_view', productId: window.location.pathname })
    }).catch(() => {});

    const slug = window.location.pathname.replace('/l/', '');

    async function loadPage() {
      const app = document.getElementById('app');
      try {
        const resp = await fetch(`/api/public/pages/${encodeURIComponent(slug)}`);
        if (!resp.ok) throw new Error('Page not found');
        const d = await resp.json();
        renderPage(d.page);
      } catch(e) {
        app.innerHTML = `<div class="error-screen"><h2>Page not found</h2><p>${e.message}</p><a href="/" class="btn btn-primary" style="margin-top:1rem;">Go home</a></div>`;
      }
    }

    function renderPage(page) {
      document.title = page.title || 'Landing Page';
      const setMeta = (id, val) => { const el = document.getElementById(id); if (el) el.content = val; };
      setMeta('ogTitle', page.title || 'Landing Page');
      setMeta('ogDesc', page.description || '');
      setMeta('twTitle', page.title || 'Landing Page');
      setMeta('twDesc', page.description || '');
      setMeta('ogImage', page.coverMediaUrl || '');
      setMeta('twImage', page.coverMediaUrl || '');

      const ld = document.createElement('script');
      ld.type = 'application/ld+json';
      ld.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": page.title || 'Landing Page',
        "description": page.description || '',
        "url": window.location.href
      });
      document.head.appendChild(ld);

      const theme = page.theme || {};
      const sections = page.sections || [];

      let html = `
        <header style="border-bottom:1px solid rgba(0,0,0,0.06);">
          <div class="lp-nav">
            <a href="/" class="logo">CONTRAK.IO</a>
            <div style="display:flex; gap:1rem; align-items:center;">
              <a href="/login" class="btn btn-outline">Log in</a>
              <a href="/register" class="btn-cta">Sign up <span class="icon">→</span></a>
            </div>
          </div>
        </header>
      `;

      sections.forEach(s => {
        const bgClass = s.background || 'light';
        const sectionStyle = bgClass === 'light' ? `style="background:${theme.background || '#ffffff'};color:${theme.textColor || '#111827'};"`
          : bgClass === 'dark' ? `style="background:#052E2B;color:#E6FFFB;"`
          : `style="background:${theme.accentColor || '#2563EB'};color:#ffffff;"`;

        if (s.type === 'hero' || s.type === 'cta') {
          html += `<div class="lp-hero ${bgClass}" ${sectionStyle}>
            <div class="lp-container">
              ${s.title ? `<h1>${s.title}</h1>` : ''}
              ${s.subtitle ? `<p>${s.subtitle}</p>` : ''}
              ${s.content ? `<p>${s.content}</p>` : ''}
              ${s.ctaText ? `<a href="${s.ctaLink || '#'}" class="btn-cta-landing">${s.ctaText}</a>` : ''}
              ${s.image ? `<img src="${s.image}" class="lp-image" alt="">` : ''}
            </div>
          </div>`;
        } else if (s.type === 'features') {
          const features = s.content ? s.content.split('\n').filter(Boolean).map((line, i) => {
            return `<div class="lp-feature-card ${bgClass}"><h3>${line}</h3></div>`;
          }).join('') : '';
          html += `<div class="lp-section ${bgClass}" ${sectionStyle}>
            <div class="lp-container">
              ${s.title ? `<h2>${s.title}</h2>` : ''}
              ${s.subtitle ? `<p class="subtitle">${s.subtitle}</p>` : ''}
              <div class="lp-features">${features || '<p>Add features as lines in Content</p>'}</div>
            </div>
          </div>`;
        } else if (s.type === 'testimonials') {
          const testimonials = s.content ? s.content.split('\n').filter(Boolean).map(line => {
            return `<div class="lp-testimonial ${bgClass}"><p>${line}</p></div>`;
          }).join('') : '';
          html += `<div class="lp-section ${bgClass}" ${sectionStyle}>
            <div class="lp-container">
              ${s.title ? `<h2>${s.title}</h2>` : ''}
              <div class="lp-testimonials">${testimonials || '<p>Add testimonials as lines in Content</p>'}</div>
            </div>
          </div>`;
        } else if (s.type === 'faq') {
          const items = s.content ? s.content.split('\n').filter(Boolean).map(line => {
            return `<div class="lp-faq-item ${bgClass}"><p>${line}</p></div>`;
          }).join('') : '';
          html += `<div class="lp-section ${bgClass}" ${sectionStyle}>
            <div class="lp-container">
              ${s.title ? `<h2>${s.title}</h2>` : ''}
              <div class="lp-faq">${items || '<p>Add FAQ items as lines in Content</p>'}</div>
            </div>
          </div>`;
        } else {
          html += `<div class="lp-section ${bgClass}" ${sectionStyle}>
            <div class="lp-container">
              ${s.title ? `<h2>${s.title}</h2>` : ''}
              ${s.subtitle ? `<p class="subtitle">${s.subtitle}</p>` : ''}
              ${s.content ? `<div>${s.content}</div>` : ''}
              ${s.image ? `<img src="${s.image}" class="lp-image" alt="">` : ''}
              ${s.ctaText ? `<div style="text-align:center;margin-top:1.5rem;"><a href="${s.ctaLink || '#'}" class="btn-cta-landing">${s.ctaText}</a></div>` : ''}
            </div>
          </div>`;
        }
      });

      html += `<footer class="lp-footer"><p>&copy; 2024 Contrak. All rights reserved.</p></footer>`;
      app.innerHTML = html;
    }

    loadPage();
  </script>
</body>
</html>
