<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Gallery - Contrak</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .media-card { position: relative; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .media-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .media-card img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .media-card .info { padding: 0.75rem; }
    .media-card .name { color: var(--green-100); font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .media-card .size { color: var(--text-muted); font-size: 0.75rem; }
    .media-card .delete-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: rgba(239,68,68,0.9); color: #fff; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 14px; cursor: pointer; display: none; align-items: center; justify-content: center; }
    .media-card:hover .delete-btn { display: flex; }
    .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 3rem; text-align: center; transition: all 0.3s; cursor: pointer; }
    .upload-zone.dragover { border-color: #34D399; background: rgba(52,211,153,0.05); }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone p { color: var(--text-muted); }
    .upload-zone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal h2 { color: var(--green-100); margin-bottom: 1rem; }
    .modal .preview { max-width: 100%; max-height: 300px; border-radius: 8px; margin-bottom: 1rem; }
    .modal .url-box { display: flex; gap: 0.5rem; }
    .modal .url-box input { flex: 1; background: var(--dark); border: 1px solid var(--border); color: var(--green-100); padding: 0.75rem; border-radius: 8px; }
    .modal .url-box button { background: linear-gradient(135deg, #34D399, #059669); color: #fff; border: none; border-radius: 8px; padding: 0.75rem 1rem; cursor: pointer; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.4; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">CONTRAK.IO</a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/products">Products</a></li>
        <li><a href="/ebooks">Ebooks</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><span id="userPlan" class="plan-badge basic">BASIC</span></li>
        <li><button id="logoutBtn" class="btn btn-outline">Log out</button></li>
      </ul>
    </nav>
  </header>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
      <h1 style="color:var(--green-100);">Media Gallery</h1>
    </div>
    <p style="color:var(--text-muted);margin-bottom:1.5rem;">Upload images to use in your products and pages.</p>

    <div class="upload-zone" id="uploadZone">
      <div class="icon"></div>
      <p>Drop images here or click to browse</p>
      <p style="font-size:0.8rem;">JPG, PNG, GIF, WebP, SVG up to 10MB</p>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp,image/svg+xml">
    </div>

    <div id="alertContainer"></div>

    <div id="mediaContainer"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <div class="modal-overlay" id="previewModal">
    <div class="modal">
      <h2 id="modalTitle">Preview</h2>
      <img id="modalImage" class="preview" src="" alt="">
      <div class="url-box">
        <input type="text" id="modalUrl" readonly>
        <button id="copyUrlBtn">Copy</button>
      </div>
      <button id="closeModal" style="margin-top:1rem;background:var(--text-muted);border:none;color:#fff;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;">Close</button>
    </div>
  </div>

  <script>
    let currentUser = null;

    const toggle = document.querySelector('.nav-toggle');
    const links = document.querySelector('.nav-links');
    if (toggle && links) {
      toggle.addEventListener('click', function() {
        const isOpen = links.classList.toggle('nav-links--open');
        toggle.classList.toggle('nav-toggle--open', isOpen);
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    }

    async function api(path, opts) {
      const r = await fetch(path, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...opts });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Request failed');
      return d;
    }

    async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (!r.ok) { window.location.href = '/login'; return; }
        const d = await r.json();
        currentUser = d.user;
        const badge = document.getElementById('userPlan');
        if (currentUser.plan === 'pro') { badge.textContent = 'PRO'; badge.className = 'plan-badge pro'; }
        loadMedia();
      } catch(e) { window.location.href = '/login'; }
    }

    async function loadMedia() {
      try {
        const d = await api('/api/media/');
        const items = d.media || [];
        const container = document.getElementById('mediaContainer');
        if (!items.length) {
          container.innerHTML = '<div class="empty-state"><div class="icon"></div><p>No images yet. Drop some above!</p></div>';
          return;
        }
        container.innerHTML = '<div class="media-grid">' + items.map(function(m) {
          const name = m.name || 'untitled';
          const size = m.size ? (m.size / 1024).toFixed(1) + ' KB' : '';
          return '<div class="media-card" data-url="' + m.url + '" data-name="' + name + '">' +
            '<img src="' + m.url + '" alt="' + name + '" loading="lazy">' +
            '<button class="delete-btn" data-id="' + m.id + '"></button>' +
            '<div class="info"><div class="name">' + name + '</div><div class="size">' + size + '</div></div></div>';
        }).join('') + '</div>';

        document.querySelectorAll('.media-card .delete-btn').forEach(function(btn) {
          btn.addEventListener('click', async function(e) {
            e.stopPropagation();
            if (!confirm('Delete this image?')) return;
            try {
              await api('/api/media/' + this.dataset.id, { method: 'DELETE' });
              showAlert('success', 'Deleted');
              loadMedia();
            } catch(err) { showAlert('error', err.message); }
          });
        });

        document.querySelectorAll('.media-card').forEach(function(card) {
          card.addEventListener('click', function() {
            document.getElementById('modalImage').src = this.dataset.url;
            document.getElementById('modalTitle').textContent = this.dataset.name;
            document.getElementById('modalUrl').value = this.dataset.url;
            document.getElementById('previewModal').classList.add('open');
          });
        });
      } catch(e) { document.getElementById('mediaContainer').innerHTML = '<div class="empty-state"><p>Error loading media</p></div>'; }
    }

    const zone = document.getElementById('uploadZone');
    const input = document.getElementById('fileInput');

    zone.addEventListener('click', function() { input.click(); });
    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault();
      zone.classList.remove('dragover');
      if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
    });
    input.addEventListener('change', function() {
      if (this.files.length) uploadFile(this.files[0]);
    });

    async function uploadFile(file) {
      if (!file.type.startsWith('image/')) { showAlert('error', 'Only images allowed'); return; }
      if (file.size > 10 * 1024 * 1024) { showAlert('error', 'Image too large (max 10MB)'); return; }
      const formData = new FormData();
      formData.append('file', file);
      try {
        const r = await fetch('/api/media/upload', { method: 'POST', credentials: 'include', body: formData });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Upload failed');
        showAlert('success', 'Uploaded successfully!');
        loadMedia();
      } catch(e) { showAlert('error', e.message); }
    }

    document.getElementById('copyUrlBtn').addEventListener('click', function() {
      const urlInput = document.getElementById('modalUrl');
      urlInput.select();
      navigator.clipboard.writeText(urlInput.value).catch(function() {});
      this.textContent = 'Copied!';
      setTimeout(() => { this.textContent = 'Copy'; }, 2000);
    });

    document.getElementById('closeModal').addEventListener('click', function() {
      document.getElementById('previewModal').classList.remove('open');
    });
    document.getElementById('previewModal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });

    function showAlert(type, msg) {
      const c = document.getElementById('alertContainer');
      c.innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>';
      setTimeout(function() { c.innerHTML = ''; }, 4000);
    }

    document.getElementById('logoutBtn').addEventListener('click', async function() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/';
    });

    checkAuth();
  </script>
</body>
</html>
