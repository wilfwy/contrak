<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="seoTitle">Product - Contrak</title>
  <meta name="description" id="seoDesc" content="Buy digital products on Contrak">
  <meta property="og:title" id="ogTitle" content="Product - Contrak">
  <meta property="og:description" id="ogDesc" content="Buy digital products on Contrak">
  <meta property="og:type" content="product">
  <meta property="og:url" id="ogUrl" content="">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="twTitle" content="Product - Contrak">
  <meta name="twitter:description" id="twDesc" content="Buy digital products on Contrak">
  <meta property="og:image" id="ogImage" content="">
  <meta name="twitter:image" id="twImage" content="">
  <link rel="stylesheet" href="/style.css">
  <style>
    .product-hero { text-align: center; padding: 4rem 2rem; background: linear-gradient(135deg, #052E2B 0%, #064E3B 25%, #0F766E 55%, #083344 100%); color: #E6FFFB; }
    .product-hero h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .product-hero .price-tag { font-size: 3rem; font-weight: bold; margin: 1rem 0; }
    .product-hero .price-tag .currency { font-size: 1.5rem; vertical-align: top; }
    .product-hero .btn-buy { background: #fff; color: #064E3B; padding: 14px 48px; border-radius: 9999px; font-weight: 700; font-size: 1.1rem; border: none; cursor: pointer; transition: transform 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
    .product-hero .btn-buy:hover { transform: translateY(-2px) scale(1.02); }
    .product-hero .btn-buy:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .product-details { max-width: 800px; margin: 2rem auto; padding: 0 2rem; }
    .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 1rem; }
    .error-screen { text-align: center; padding: 4rem 2rem; }
    .error-screen h2 { margin-bottom: 1rem; }
    .version-selector { margin: 1rem 0; }
    .version-selector select { padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; font-size: 1rem; cursor: pointer; }
    .version-selector select option { color: #000; }
    .nav-public { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; max-width: 1200px; margin: 0 auto; }
  </style>
</head>
<body>
  <header>
    <div class="nav-public">
      <a href="/" class="logo">CONTRAK.IO</a>
      <div style="display:flex; gap:1rem; align-items:center;">
        <a href="/login" class="btn btn-outline">Log in</a>
        <a href="/register" class="btn-cta">Sign up <span class="icon">→</span></a>
      </div>
    </div>
  </header>

  <div id="app">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Loading product...</p>
    </div>
  </div>

  <script>
    // Track page view
    fetch('/api/analytics/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'product_view', productId: window.location.pathname.replace('/p/', '') })
    }).catch(() => {});

    const params = new URLSearchParams(window.location.search);
    const slug = window.location.pathname.replace('/p/', '');
    const versionParam = params.get('version');

    async function loadProduct() {
      const app = document.getElementById('app');
      try {
        const resp = await fetch(`/api/public/products/${encodeURIComponent(slug)}`);
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.error || 'Product not found');
        }
        const d = await resp.json();
        renderProduct(d.product, d.versions);
        return d.product;
      } catch(e) {
        app.innerHTML = `<div class="error-screen">
          <h2>Product not found</h2>
          <p>${e.message}</p>
          <a href="/" class="btn btn-primary" style="margin-top:1rem;">Go home</a>
        </div>`;
      }
    }

    function setMeta(title, desc) {
      document.title = title;
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.content = val; };
      set('seoTitle', title); set('seoDesc', desc);
      set('ogTitle', title); set('ogDesc', desc);
      set('twTitle', title); set('twDesc', desc);
      const url = document.getElementById('ogUrl');
      if (url) url.content = window.location.href;
    }

    function renderProduct(product, versions) {
      const publisedVersions = (versions || []).filter(v => v.status === 'published');
      const selectedVersion = publisedVersions.find(v => v.id === versionParam) || publisedVersions[0];
      setMeta(product.title + ' - Contrak', product.description || 'Buy this digital product');
      const setImg = (id, val) => { const el = document.getElementById(id); if (el) el.content = val; };
      setImg('ogImage', product.coverMediaUrl || '');
      setImg('twImage', product.coverMediaUrl || '');

      const ld = document.createElement('script');
      ld.type = 'application/ld+json';
      ld.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Product",
        "name": product.title || 'Untitled',
        "description": product.description || '',
        "url": window.location.href,
        "offers": {
          "@type": "Offer",
          "price": (selectedVersion.price / 100).toFixed(2),
          "priceCurrency": selectedVersion.currency || 'EUR',
          "availability": "https://schema.org/InStock"
        }
      });
      document.head.appendChild(ld);

      const app = document.getElementById('app');
      if (!selectedVersion) {
        app.innerHTML = `<div class="error-screen">
          <h2>No published version available</h2>
          <p>This product has no published versions yet.</p>
          <a href="/" class="btn btn-primary" style="margin-top:1rem;">Go home</a>
        </div>`;
        return;
      }

      const sym = (c) => ({'EUR':'€','USD':'$','GBP':'£','JPY':'¥','CAD':'CA$','AUD':'A$','CHF':'Fr','CNY':'¥','SEK':'kr','NOK':'kr','DKK':'kr','BRL':'R$','INR':'₹'}[c?.toUpperCase()] || c || '€');
      const price = (selectedVersion.price / 100).toFixed(2);
      const versionOptions = publisedVersions.map(v =>
        `<option value="${v.id}" ${v.id === selectedVersion.id ? 'selected' : ''}>${v.versionLabel} - ${sym(v.currency)}${(v.price/100).toFixed(2)}</option>`
      ).join('');

      app.innerHTML = `
        <div class="product-hero">
          <h1>${product.title || 'Untitled Product'}</h1>
          ${product.description ? `<p style="opacity:0.8;margin-bottom:0.5rem;">${product.description}</p>` : ''}
          <div class="version-selector">
            <label style="display:block;margin-bottom:0.5rem;font-size:0.9rem;">Select version:</label>
            <select id="versionSelect" onchange="switchVersion('${product.slug || product.id}', this.value)">
              ${versionOptions}
            </select>
          </div>
          <div class="price-tag"><span class="currency">${sym(selectedVersion.currency)}</span>${price}</div>
          <div style="display:flex; gap:0.75rem; justify-content:center; align-items:center; flex-wrap:wrap; margin-top:1rem;">
            <button class="btn-buy" id="addToCartBtn" onclick="addToCart('${selectedVersion.id}')" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);">
              Add to Cart →</button>
            <button class="btn-buy" id="buyBtn" onclick="buyNow('${product.slug || product.id}', '${selectedVersion.id}', ${selectedVersion.price}, '${selectedVersion.currency}')" style="background:#fff;color:#064E3B;">
              Buy Now →</button>
          </div>
          <div id="buyError" style="color:#FCA5A5;margin-top:0.5rem;font-size:0.9rem;"></div>
        </div>
        <div class="product-details">
          ${selectedVersion.marketingCopy ? `<div style="background:#fff;border-radius:10px;padding:2rem;box-shadow:0 10px 25px rgba(15,23,42,0.08);">
            <h2 style="margin-bottom:1rem;">About this product</h2>
            <div style="color:#374151;line-height:1.8;">${selectedVersion.marketingCopy}</div>
          </div>` : ''}
          <div style="text-align:center;margin-top:2rem;">
            <div style="display:inline-flex;gap:0.75rem;align-items:center;">
              <span style="color:#6B7280;font-size:0.9rem;">Share:</span>
              <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(product.title)}&url=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener" style="text-decoration:none;font-size:1.25rem;" title="Share on Twitter">𝕏</a>
              <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener" style="text-decoration:none;font-size:1.25rem;" title="Share on Facebook">f</a>
              <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener" style="text-decoration:none;font-size:1.25rem;" title="Share on LinkedIn">in</a>
            </div>
          </div>
          <div style="text-align:center;margin-top:1rem;color:#6B7280;font-size:0.9rem;">
            Secure checkout powered by Stripe
          </div>
        </div>
        <div id="reviewsSection"></div>
      `;
    }

    function switchVersion(slug, versionId) {
      window.location.href = `/p/${slug}?version=${versionId}`;
    }

    async function addToCart(versionId) {
      const btn = document.getElementById('addToCartBtn');
      btn.disabled = true;
      btn.textContent = 'Adding...';
      try {
        const resp = await fetch('/api/cart/items', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productVersionId: versionId })
        });
        const d = await resp.json();
        if (!resp.ok) throw new Error(d.error || 'Failed to add');
        btn.textContent = '✓ Added!';
        setTimeout(() => { btn.disabled = false; btn.textContent = 'Add to Cart →'; }, 2000);
      } catch(e) {
        const errDiv = document.getElementById('buyError');
        errDiv.textContent = e.message.includes('Missing token')
          ? 'Please log in first.'
          : e.message;
        btn.disabled = false;
        btn.textContent = 'Add to Cart →';
      }
    }

    async function buyNow(slug, versionId, price, currency) {
      const btn = document.getElementById('buyBtn');
      const errDiv = document.getElementById('buyError');
      btn.disabled = true;
      btn.textContent = 'Processing...';
      errDiv.textContent = '';

      try {
        const baseUrl = window.location.origin;
        const resp = await fetch('/api/orders/create-checkout-session', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            productVersionId: versionId,
            amount: price,
            currency: currency.toLowerCase(),
            successUrl: `${baseUrl}/p/${slug}?payment=success`,
            cancelUrl: `${baseUrl}/p/${slug}?payment=cancel`
          })
        });
        const d = await resp.json();
        if (!resp.ok) throw new Error(d.error || 'Checkout failed');
        if (d.url) {
          window.location.href = d.url;
        } else {
          throw new Error('No checkout URL returned');
        }
      } catch(e) {
        errDiv.textContent = e.message.includes('Missing token')
          ? 'Please log in first to purchase.'
          : e.message;
        btn.disabled = false;
        btn.textContent = 'Buy Now →';
      }
    }

    // Handle payment redirect messages
    const paymentStatus = params.get('payment');
    const orderId = params.get('orderId');
    if (paymentStatus === 'success' && orderId) {
      alert('Payment successful! Thank you for your purchase.');
    } else if (paymentStatus === 'cancel') {
      alert('Payment cancelled.');
    }

    loadProduct().then(product => {
      if (product && product.id) renderReviews(product.id);
    });

    function renderReviews(productId) {
      const container = document.getElementById('reviewsSection');
      if (!container) return;

      fetch('/api/reviews/' + productId)
        .then(r => r.json())
        .then(d => {
          const avg = d.average || { average: 0, count: 0 };
          const reviews = d.reviews || [];
          let html = '<div style="max-width:800px;margin:2rem auto;padding:0 2rem;"><h2 style="margin-bottom:1rem;">Customer Reviews</h2>';

          html += '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1.5rem;">';
          html += '<span style="font-size:1.5rem;font-weight:700;">' + avg.average + '</span>';
          html += '<span style="color:#FBBF24;font-size:1.25rem;">' + '★'.repeat(Math.round(avg.average)) + '☆'.repeat(5 - Math.round(avg.average)) + '</span>';
          html += '<span style="color:var(--text-muted);">(' + avg.count + ' reviews)</span></div>';

          if (reviews.length === 0) {
            html += '<p style="color:var(--text-muted);">No reviews yet. Be the first!</p>';
          } else {
            html += reviews.map(r => {
              const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
              return '<div style="padding:1rem;border:1px solid var(--border);border-radius:8px;margin-bottom:0.75rem;background:var(--card-bg);"><div style="display:flex;justify-content:space-between;"><span style="color:#FBBF24;">' + stars + '</span><span style="color:var(--text-muted);font-size:0.85rem;">' + (r.createdAt ? new Date(r.createdAt).toLocaleDateString() : '') + '</span></div>' + (r.comment ? '<p style="margin-top:0.5rem;color:var(--green-200);">' + r.comment + '</p>' : '') + '</div>';
            }).join('');
          }

          html += '<div style="margin-top:2rem;padding:1.5rem;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);"><h3 style="margin-bottom:1rem;">Write a Review</h3><div id="reviewForm"><select id="reviewRating" style="padding:0.5rem;margin-bottom:0.5rem;width:100%;"><option value="5">★★★★★</option><option value="4">★★★★☆</option><option value="3">★★★☆☆</option><option value="2">★★☆☆☆</option><option value="1">★☆☆☆☆</option></select><textarea id="reviewComment" rows="3" placeholder="Share your thoughts..." style="width:100%;padding:0.75rem;margin-bottom:0.5rem;"></textarea><button class="btn btn-primary" onclick="submitReview(\'' + productId + '\')">Submit Review</button><div id="reviewError" style="color:#FCA5A5;font-size:0.9rem;margin-top:0.5rem;"></div></div></div>';

          html += '</div>';
          container.innerHTML = html;
        })
        .catch(() => {});
    }

    async function submitReview(productId) {
      const rating = parseInt(document.getElementById('reviewRating').value);
      const comment = document.getElementById('reviewComment').value;
      const errDiv = document.getElementById('reviewError');
      try {
        const resp = await fetch('/api/reviews', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId, rating, comment })
        });
        const d = await resp.json();
        if (!resp.ok) throw new Error(d.error || 'Failed');
        renderReviews(productId);
      } catch(e) {
        errDiv.textContent = e.message;
      }
    }
  </script>
</body>
</html>
