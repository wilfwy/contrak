<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coupons - Contrak</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .coupon-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .coupon-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .coupon-table { width: 100%; border-collapse: collapse; }
    .coupon-table th { text-align: left; color: var(--text-muted); font-size: 0.8rem; font-weight: 600; padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em; }
    .coupon-table td { padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); color: var(--green-200); font-size: 0.9rem; }
    .coupon-table tr:hover td { background: rgba(52,211,153,0.03); }
    .coupon-code { font-family: monospace; color: var(--green-100); font-weight: 700; font-size: 0.95rem; }
    .status-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .status-active { background: rgba(52,211,153,0.15); color: #34D399; }
    .status-inactive { background: rgba(239,68,68,0.15); color: #EF4444; }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { color: var(--green-100); margin-bottom: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .modal input, .modal textarea, .modal select { background: var(--dark); border: 1px solid var(--border); color: var(--green-100); padding: 0.75rem; border-radius: 8px; width: 100%; box-sizing: border-box; }
    .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--green-500); box-shadow: 0 0 15px var(--accent-glow); }
    .modal label { color: var(--green-200); font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 0.3rem; }
    .modal .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
    .modal .checkbox-row input[type="checkbox"] { width: auto; accent-color: #34D399; }
    .modal .checkbox-row label { margin-bottom: 0; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">CONTRAK.IO</a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/ebooks">Ebooks</a></li>
        <li><a href="/products">Products</a></li>
        <li><a href="/pages">Pages</a></li>
        <li><a href="/media">Media</a></li>
        <li><a href="/orders-admin">Orders</a></li>
        <li><a href="/coupons" class="active">Coupons</a></li>
        <li><a href="/blog-admin">Blog</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><span id="userPlan" class="plan-badge basic">BASIC</span></li>
        <li><button id="logoutBtn" class="btn btn-outline">Log out</button></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div id="alertContainer"></div>

    <div class="coupon-toolbar">
      <h1>Coupons</h1>
      <button class="btn btn-primary" id="newCouponBtn">+ Create Coupon</button>
    </div>

    <div class="coupon-card">
      <div id="couponsList">
        <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="couponModal">
    <div class="modal">
      <h2 id="modalTitle">Create Coupon</h2>
      <form id="couponForm">
        <div class="form-group">
          <label>Code *</label>
          <input type="text" id="cpnCode" required placeholder="SUMMER2025" style="text-transform:uppercase;">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="cpnDescription" rows="2" placeholder="Optional description"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Discount Type</label>
            <select id="cpnDiscountType">
              <option value="percent">Percent</option>
              <option value="fixed">Fixed Amount</option>
            </select>
          </div>
          <div class="form-group">
            <label>Discount Value *</label>
            <input type="number" id="cpnDiscountValue" required min="0" step="0.01" placeholder="10">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Min Amount</label>
            <input type="number" id="cpnMinAmount" min="0" step="0.01" placeholder="0">
          </div>
          <div class="form-group">
            <label>Max Uses</label>
            <input type="number" id="cpnMaxUses" min="1" step="1" placeholder="Unlimited">
          </div>
        </div>
        <div class="form-group">
          <label>Expires At</label>
          <input type="date" id="cpnExpiresAt">
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="cpnActive" checked>
          <label for="cpnActive">Active</label>
        </div>
        <div style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:1.5rem;">
          <button type="button" class="btn btn-outline" id="cancelCouponBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function() {
      const toggle = document.querySelector('.nav-toggle');
      const links = document.querySelector('.nav-links');
      if (toggle && links) {
        toggle.addEventListener('click', function() {
          const isOpen = links.classList.toggle('nav-links--open');
          toggle.classList.toggle('nav-toggle--open', isOpen);
          toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });
      }
    })();

    let currentUser = null;
    let editingCouponId = null;

    async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (!r.ok) { window.location.href = '/login'; return; }
        const d = await r.json();
        currentUser = d.user;
        const badge = document.getElementById('userPlan');
        if (currentUser.plan === 'pro') {
          badge.textContent = 'PRO';
          badge.className = 'plan-badge pro';
        } else {
          badge.textContent = 'BASIC';
          badge.className = 'plan-badge basic';
        }
        loadCoupons();
      } catch(e) { window.location.href = '/login'; }
    }

    async function api(path, opts = {}) {
      const r = await fetch(path, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...opts });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Request failed');
      return d;
    }

    async function loadCoupons() {
      try {
        const d = await api('/api/coupons');
        const list = document.getElementById('couponsList');
        const coupons = d.coupons || [];
        if (coupons.length === 0) {
          list.innerHTML = '<div class="empty-state"><p>No coupons yet.</p><button class="btn btn-primary" onclick="openNewCoupon()" style="margin-top:1rem;">+ Create your first coupon</button></div>';
          return;
        }
        list.innerHTML = '<table class="coupon-table"><thead><tr><th>Code</th><th>Discount</th><th>Status</th><th>Uses</th><th>Expires</th><th>Actions</th></tr></thead><tbody>' +
          coupons.map(function(c) {
            const discountStr = c.discountPercent ? c.discountPercent + '%' : (c.discountAmount ? (c.discountAmount / 100).toFixed(2) + ' ' + (c.currency || 'EUR') : '-');
            const statusClass = c.active ? 'status-active' : 'status-inactive';
            const statusText = c.active ? 'Active' : 'Inactive';
            const usesStr = (c.currentUses || 0) + (c.maxUses ? ' / ' + c.maxUses : '');
            const expiresStr = c.expiresAt ? new Date(c.expiresAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';
            return '<tr><td><span class="coupon-code">' + esc(c.code) + '</span></td>' +
              '<td>' + discountStr + '</td>' +
              '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
              '<td>' + usesStr + '</td>' +
              '<td>' + expiresStr + '</td>' +
              '<td style="white-space:nowrap;"><button class="btn btn-small btn-outline" onclick="editCoupon(\'' + c.id + '\')" style="margin-right:0.25rem;">Edit</button><button class="btn btn-small btn-outline" onclick="deleteCoupon(\'' + c.id + '\')" style="color:#EF4444;border-color:#EF4444;">Delete</button></td></tr>';
          }).join('') +
          '</tbody></table>';
      } catch(e) {
        document.getElementById('couponsList').innerHTML = '<div class="alert alert-error">' + e.message + '</div>';
      }
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function openNewCoupon() {
      editingCouponId = null;
      document.getElementById('modalTitle').textContent = 'Create Coupon';
      document.getElementById('couponForm').reset();
      document.getElementById('cpnActive').checked = true;
      document.getElementById('cpnDiscountType').value = 'percent';
      document.getElementById('couponModal').classList.add('open');
    }

    async function editCoupon(id) {
      try {
        const d = await api('/api/coupons');
        const coupon = d.coupons.find(function(c) { return c.id === id; });
        if (!coupon) { showAlert('error', 'Coupon not found'); return; }
        editingCouponId = id;
        document.getElementById('modalTitle').textContent = 'Edit Coupon';
        document.getElementById('cpnCode').value = coupon.code || '';
        document.getElementById('cpnDescription').value = coupon.description || '';
        document.getElementById('cpnDiscountType').value = coupon.discountPercent ? 'percent' : 'fixed';
        document.getElementById('cpnDiscountValue').value = coupon.discountPercent || (coupon.discountAmount ? (coupon.discountAmount / 100) : '');
        document.getElementById('cpnMinAmount').value = coupon.minAmount ? (coupon.minAmount / 100) : '';
        document.getElementById('cpnMaxUses').value = coupon.maxUses || '';
        document.getElementById('cpnExpiresAt').value = coupon.expiresAt ? coupon.expiresAt.split('T')[0] : '';
        document.getElementById('cpnActive').checked = coupon.active !== false;
        document.getElementById('couponModal').classList.add('open');
      } catch(e) { showAlert('error', e.message); }
    }

    document.getElementById('couponForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const discountType = document.getElementById('cpnDiscountType').value;
      const discountValue = parseFloat(document.getElementById('cpnDiscountValue').value);
      const payload = {
        code: document.getElementById('cpnCode').value.toUpperCase(),
        description: document.getElementById('cpnDescription').value || null,
        discountPercent: discountType === 'percent' ? discountValue : null,
        discountAmount: discountType === 'fixed' ? Math.round(discountValue * 100) : null,
        minAmount: document.getElementById('cpnMinAmount').value ? Math.round(parseFloat(document.getElementById('cpnMinAmount').value) * 100) : null,
        maxUses: document.getElementById('cpnMaxUses').value ? parseInt(document.getElementById('cpnMaxUses').value) : null,
        expiresAt: document.getElementById('cpnExpiresAt').value || null,
        active: document.getElementById('cpnActive').checked
      };
      try {
        if (editingCouponId) {
          await api('/api/coupons/' + editingCouponId, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          await api('/api/coupons', { method: 'POST', body: JSON.stringify(payload) });
        }
        document.getElementById('couponModal').classList.remove('open');
        showAlert('success', editingCouponId ? 'Coupon updated!' : 'Coupon created!');
        loadCoupons();
      } catch(e) { showAlert('error', e.message); }
    });

    document.getElementById('cancelCouponBtn').addEventListener('click', function() {
      document.getElementById('couponModal').classList.remove('open');
    });

    document.getElementById('newCouponBtn').addEventListener('click', openNewCoupon);

    async function deleteCoupon(id) {
      if (!confirm('Delete this coupon?')) return;
      try {
        await api('/api/coupons/' + id, { method: 'DELETE' });
        showAlert('success', 'Coupon deleted');
        loadCoupons();
      } catch(e) { showAlert('error', e.message); }
    }

    function showAlert(type, msg) {
      var c = document.getElementById('alertContainer');
      c.innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>';
      setTimeout(function() { c.innerHTML = ''; }, 4000);
    }

    document.getElementById('logoutBtn').addEventListener('click', async function() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/';
    });

    checkAuth();
  </script>
</body>
</html>
